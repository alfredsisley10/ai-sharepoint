<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400">
  <rect width="640" height="400" rx="16" fill="#111827"/>
  <text x="320" y="60" font-family="system-ui,sans-serif" font-size="22" font-weight="600" fill="#f9fafb" text-anchor="middle">Know your spend before it happens</text>
  <!-- gauge -->
  <rect x="90" y="120" width="460" height="18" rx="9" fill="#1f2937"/>
  <rect x="90" y="120" width="290" height="18" rx="9" fill="#22d3ee"/>
  <rect x="458" y="112" width="3" height="34" fill="#fbbf24"/>
  <text x="460" y="104" font-family="system-ui,sans-serif" font-size="12" fill="#fbbf24" text-anchor="middle">soft 80%</text>
  <rect x="548" y="112" width="3" height="34" fill="#f87171"/>
  <text x="544" y="104" font-family="system-ui,sans-serif" font-size="12" fill="#f87171" text-anchor="middle">hard 100%</text>
  <text x="90" y="166" font-family="system-ui,sans-serif" font-size="14" fill="#9ca3af">~63% of 300 premium units this month · estimate</text>
  <!-- daily bars -->
  <g fill="#374151">
    <rect x="90" y="280" width="14" height="20" rx="3"/>
    <rect x="112" y="266" width="14" height="34" rx="3"/>
    <rect x="134" y="288" width="14" height="12" rx="3"/>
    <rect x="156" y="252" width="14" height="48" rx="3"/>
    <rect x="178" y="274" width="14" height="26" rx="3"/>
    <rect x="200" y="296" width="14" height="4" rx="2"/>
    <rect x="222" y="262" width="14" height="38" rx="3"/>
  </g>
  <g fill="#22d3ee">
    <rect x="244" y="240" width="14" height="60" rx="3"/>
    <rect x="266" y="270" width="14" height="30" rx="3"/>
    <rect x="288" y="254" width="14" height="46" rx="3"/>
    <rect x="310" y="282" width="14" height="18" rx="3"/>
    <rect x="332" y="246" width="14" height="54" rx="3"/>
  </g>
  <line x1="90" y1="300" x2="550" y2="300" stroke="#374151" stroke-width="1.5"/>
  <!-- status pills -->
  <rect x="380" y="236" width="170" height="34" rx="17" fill="#1f2937" stroke="#fbbf24"/>
  <text x="465" y="258" font-family="system-ui,sans-serif" font-size="14" fill="#fbbf24" text-anchor="middle">⚠ warn at soft cap</text>
  <rect x="380" y="206" width="170" height="0" fill="none"/>
  <rect x="380" y="196" width="170" height="34" rx="17" fill="#1f2937" stroke="#f87171"/>
  <text x="465" y="218" font-family="system-ui,sans-serif" font-size="14" fill="#f87171" text-anchor="middle">⛔ block at hard cap</text>
  <text x="320" y="356" font-family="system-ui,sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">Economy-first model policy, pre-flight estimates, and per-request override when you really need it.</text>
</svg>
