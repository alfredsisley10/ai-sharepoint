name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Native-dependency gate (ADR-0016)
        run: npm run check:native

      - name: Secret scan (PLAN §6)
        run: npm run scan:secrets

      - name: Package VSIX
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-sharepoint-vsix
          path: "*.vsix"
          if-no-files-found: error
