name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the workflow/pain, not only the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
  - type: textarea
    id: usage
    attributes:
      label: Usage context (optional)
      description: |
        A *Usage only* diagnostics bundle (**AI SharePoint: Export Diagnostics Bundle**) helps
        us see which features matter in real deployments — anonymized, previewed, optional.
